<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVERYDAY ZZANG-NA</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#fcfcfc] text-[#1a1a1a] font-sans antialiased min-h-screen flex flex-col justify-between">

    <!-- 상단 바 (현재 시간 표시) -->
    <header class="border-b border-gray-100 px-6 py-4 flex justify-between items-center bg-white">
        <div class="flex items-center gap-2">
            <div class="w-2.5 h-2.5 rounded-full bg-[#1e3f20] animate-pulse"></div>
            <span class="text-xs uppercase tracking-widest font-bold text-gray-500">Sweet Home Status</span>
        </div>
        <div class="text-sm font-mono font-medium text-gray-600" id="current-time">00:00:00</div>
    </header>

    <!-- 메인 상태창 섹션 -->
    <main class="max-w-5xl w-full mx-auto p-6 my-auto grid md:grid-cols-2 gap-8">
        
        <!-- 캐릭터 1: 강창호 (딥 그린 & 퍼플 조합) -->
        <div class="bg-[#f4f7f4] border border-emerald-100 rounded-2xl p-8 shadow-xs flex flex-col justify-between min-h-[340px] transition-all hover:border-purple-300">
            <div>
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 class="text-2xl font-bold tracking-tight text-[#1e3f20]">강창호</h2>
                    </div>
                    <span class="bg-[#7c3aed] text-white text-xs px-3 py-1 rounded-full font-medium" id="char1-tag">상태</span>
                </div>
                
                <!-- 현재 행동 문구 -->
                <p class="text-lg text-gray-800 font-medium leading-relaxed" id="char1-action">
                    상태를 불러오는 중입니다...
                </p>
            </div>

            <!-- 하단 타임스탬프와 아이콘 -->
            <div class="border-t border-emerald-200/50 pt-4 mt-6 flex justify-between items-center text-xs text-emerald-700 font-mono">
                <span id="char1-time">00:00 - 00:59</span>
                <i data-lucide="shield" class="w-4 h-4 text-purple-600"></i>
            </div>
        </div>

        <!-- 캐릭터 2: 나결 (회색 & 검정 조합) -->
        <div class="bg-[#f5f5f5] border border-gray-200 rounded-2xl p-8 shadow-xs flex flex-col justify-between min-h-[340px] transition-all hover:border-black">
            <div>
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 class="text-2xl font-bold tracking-tight text-gray-900">나결</h2>
                    </div>
                    <span class="bg-black text-white text-xs px-3 py-1 rounded-full font-medium" id="char2-tag">상태</span>
                </div>
                
                <!-- 현재 행동 문구 -->
                <p class="text-lg text-gray-800 font-medium leading-relaxed" id="char2-action">
                    상태를 불러오는 중입니다...
                </p>
            </div>

            <!-- 하단 타임스탬프와 아이콘 -->
            <div class="border-t border-gray-200 pt-4 mt-6 flex justify-between items-center text-xs text-gray-500 font-mono">
                <span id="char2-time">00:00 - 00:59</span>
                <i data-lucide="moon" class="w-4 h-4 text-black"></i>
            </div>
        </div>

    </main>

    <!-- 하단 푸터 (새로고침 버튼 포함) -->
    <footer class="border-t border-gray-100 px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4 bg-white text-xs text-gray-400">
        <div>© 2026 EVERYDAY ZZANG-NA. Built with Vibe Coding.</div>
        <button onclick="updateCharacters()" class="flex items-center gap-1.5 px-3 py-1.5 border border-gray-200 rounded-md hover:bg-gray-50 hover:text-gray-700 transition-colors cursor-pointer">
            <i data-lucide="refresh-cw" class="w-3 h-3"></i>
            <span>상태 강제 새로고침</span>
        </button>
    </footer>

    <!-- 자바스크립트 로직 -->
    <script>
        // 강창호 호칭 리스트에서 '결아' 제외
        const changhoCall = ["나결", "나결 씨", "여보", "자기", "마누라"];
        const gyeolCall = ["강 헌터", "강창호", "강창호 헌터", "여보", "자기"];

        function getCall(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        const characterData = {
            changho: {
                sleeping: [
                    "아내의 숨소리를 들으며 깊은 잠에 빠져 있습니다. 마력 수치가 안정적으로 회복되는 중입니다.",
                    "침대 깊숙이 파묻혀 곤히 자고 있습니다. 가끔 아내 쪽으로 이불을 더 끌어다 덮어줍니다.",
                    "평화로운 얼굴로 수면 중입니다. 집 안 전체에 쳐둔 방어 결계 덕에 그 어떤 S급 헌터보다 편안한 밤입니다."
                ],
                dreamTalk: [
                    () => `눈을 비비며 일어나 옆에 있는 아내를 껴안고 어젯밤 꿈 이야기를 합니다. "내가 꿈에서 특이한 기계를 만지는 꿈을 꿨는데 말이야, ${getCall(changhoCall)}... 진짜 생생했어."`,
                    () => `잠에서 깨자마자 옆자리의 아내에게 말을 건넵니다. "${getCall(changhoCall)}, 나 꿈에서 게이트 보스로 거대 고양이가 나오는 꿈 꿨어. 너무 귀엽더라."`,
                    () => `아내를 보며 부스스한 머리로 웃습니다. "${getCall(changhoCall)} 씨, 꿈에서 우리 둘이 아주 한적한 시골로 여행 가는 꿈을 꿨어요. 기분 좋네."`
                ],
                morning: [
                    () => `부엌에서 정성스럽게 핸드드립 커피를 내리고 있습니다. 진하게 퍼지는 향을 맡으며 아내가 깰 시간을 기다립니다.`,
                    () => `침대 머리맡에서 태블릿을 켜고 밤새 포털 사이트에 올라온 최신 뉴스 기사들을 검색하고 있습니다. 커피를 내리기 전의 가벼운 루틴입니다.`,
                    () => `따뜻한 아메리카노를 잔에 따르며, 오늘 점심으로 먹을 일식 레시피를 패드로 훑어보고 있습니다.`
                ],
                afternoon: [
                    () => {
                        // 일주일에 딱 한 번 (일요일 = 0) 지하실 루틴 작동
                        const isBasementDay = new Date().getDay() === 0;
                        if (isBasementDay) {
                            return "지하실로 내려가 아주 오랜만에 기계를 만지고 있습니다. 일주일에 딱 한 번 있을까 말까 한 창호의 비밀스러운 정밀 조립 시간입니다.";
                        } else {
                            return "소파에 편하게 앉아 태블릿을 켜고 포털 사이트에 접속해 최신 뉴스를 검색하고 있습니다. 게이트 동향이나 사회 기사를 꼼꼼히 읽는 중입니다.";
                        }
                    },
                    () => {
                        const isBasementDay = new Date().getDay() === 0;
                        if (isBasementDay) {
                            return "지하실 작업대에서 드물게 찾아온 기계 제어 루틴을 수행 중입니다. 수석 엔지니어답게 공구들을 정교하게 다룹니다.";
                        } else {
                            return "거실 소파에 앉아 개인적으로 두꺼운 책을 읽으며 조용하고 여유로운 오후를 보내고 있습니다. 완벽한 은신 생활입니다.";
                        }
                    },
                    () => `거실 대형 스크린으로 실시간 티비 뉴스를 시청하며 최근 헌터 연합의 동향을 조용히 분석하고 있습니다. 외부 활동 없는 평화로운 일상입니다.`,
                    () => `아내 옆에서 개인 태블릿으로 관심 있는 분야의 최신 뉴스 기사를 검색하거나 흥미로운 칼럼을 읽으며 시간을 보내고 있습니다.`
                ],
                dinner: [
                    () => `오늘 저녁은 정갈한 일식 코스입니다. 밥을 몇 숟가락 뜨지 않는 아내를 보며 걱정스레 속상해합니다. "${getCall(changhoCall)}, 한 입만 더 먹자."`,
                    () => `정성껏 준비한 일식 돈부리를 식탁에 올립니다. 아내의 앞접시에 맛있는 부위를 골라 올려주며 흐뭇하게 바라봅니다.`,
                    () => `식탁에 마주 앉아 초밥을 먹는 중입니다. 여러 음식을 복스럽게 먹으면서도 아내의 적은 식사량을 부지런히 챙깁니다.`
                ],
                night: [
                    () => `모든 식사와 뉴스 시청을 마치고 소파에 편하게 기댔습니다. 옆에서 영화를 보는 아내의 손을 만지작거리며 따뜻한 차를 마십니다.`,
                    () => `거실 조명을 어둡게 조절하고 아내 곁에 앉았습니다. 소파에 기대어 아내의 머리카락을 부드럽게 쓰다듬어 주며 함께 영화를 시청합니다.`,
                    () => `아내가 고른 드라마를 함께 조용히 시청하고 있습니다. 화면 내용보다는 옆에 앉은 아내의 얼굴에 더 시선이 가는 듯합니다.`
                ],
                readyToSleep: [
                    () => `아내와 함께 침대에 나란히 누웠습니다. 아내의 손을 꼭 잡고 눈을 맞추며 속삭입니다. "사랑해 ${getCall(changhoCall)}, 내 꿈꿔."`,
                    () => `이불을 머리까지 폭 덮고 아내를 품에 안아주며 다정하게 말합니다. "오늘 하루도 수고했어, ${getCall(changhoCall)}. 사랑해. 내 꿈에서 만나."`,
                    () => `은은한 스탠드 불빛 아래에서 아내의 이마에 살짝 입을 맞춤니다. "${getCall(changhoCall)} 씨, 많이 사랑해요. 좋은 꿈만 꿔요."`
                ]
            },
            gyeol: {
                sleeping: [
                    "창호의 넓은 품에 안겨 세상 모르게 꿀잠을 자고 있습니다. 은퇴한 전직 A급 헌터의 가장 평화로운 시간입니다.",
                    "침대 한가운데에서 아주 편안한 자세로 깊은 잠에 들어 있습니다. 마력 소모가 전혀 없는 완벽한 휴식입니다.",
                    "숨소리조차 조용하게 곤히 자고 있습니다. 창호가 덮어준 이불 안이 무척 따뜻합니다."
                ],
                dreamTalk: [
                    () => `비몽사몽한 상태로 창호의 꿈 이야기를 가만히 듣고 있습니다. "진짜? ${getCall(gyeolCall)}는 꿈에서도 기계를 만지네..." 그러곤 자기가 꾼 엉뚱한 꿈을 조근조근 털어놓습니다.`,
                    () => `하품을 작게 하며 창호의 가슴에 얼굴을 묻습니다. "${getCall(gyeolCall)}, 나는 꿈에서 엄청나게 큰 생선회를 먹는 꿈을 꿨어. 행복하더라."`,
                    () => `눈을 깜빡이며 일어납니다. "${getCall(gyeolCall)}, 난 꿈 안 꿨는데 깨니까 앞이 보이니까 그냥 좋아."라며 창호의 뺨을 살짝 만집니다.`
                ],
                morning: [
                    () => `거실 소파 한구석에 편한 자세로 웅크려 앉아 두꺼운 소설책을 읽기 시작했습니다. 전직 헌터의 완벽한 백수 모드입니다.`,
                    () => `창호가 내리는 향긋한 커피 냄새를 맡으며 스마트폰으로 오늘 업데이트된 웹툰을 챙겨보고 있습니다.`,
                    () => `잠을 완전히 깨기 위해 거실 창가를 멍하니 바라보며 소파에서 뒹굴거립니다. 실내의 안락함에 대만족 중입니다.`
                ],
                afternoon: [
                    () => `거실 대형 스크린으로 넷플릭스 스릴러 드라마를 초집중해서 정주행하고 있습니다. 팝콘 대신 창호가 준 간식을 깨작입니다.`,
                    () => `태블릿을 들고 침대와 소파를 오가며 밀린 영화를 보고 있습니다. 은퇴 후 이보다 더 완벽한 집콕 라이프는 없습니다.`,
                    () => `창호가 옆에서 뉴스를 보거나 책을 읽는 동안, 그 곁에 앉아 조용히 만화책을 정주행하고 있습니다.`,
                    () => `소파에 비스듬히 누워 이어폰을 꽂고 잔잔한 오디오북을 듣고 있습니다. 발가락을 까딱이며 나른한 오후를 보냅니다.`
                ],
                dinner: [
                    () => `식탁에 마주 앉아 창호가 정성껏 썰어준 날생선(회)을 아주 맛있게 오물거리고 있습니다. 여전히 밥그릇의 밥은 거의 줄어들지 않았습니다.`,
                    () => `창호의 걱정 가득한 시선을 받으며 회 한 점을 입에 넣습니다. "${getCall(gyeolCall)}, 나 원래 회 좋아하잖아. 밥 안 먹어도 배불러."`,
                    () => `적은 양이지만 아주 꼭꼭 씹어 저녁을 먹습니다. 창호가 앞접시에 놓아주는 일식 반찬들을 조용히 받아먹으며 미소 짓습니다.`
                ],
                night: [
                    () => `태블릿으로 흥미진진한 웹소설을 읽는 중입니다. 중간중간 옆에서 같이 화면을 보거나 쉬고 있는 창호를 힐끗 구경합니다.`,
                    () => `창호 옆에 찰딱 붙어 앉아 휴대폰 화면을 보여주며 재밌는 짤방을 공유하고 있습니다. 거실에 두 사람의 웃음소리가 번집니다.`,
                    () => `조용한 음악을 틀어놓고 소파에서 창호의 다리를 베개 삼아 누워 있습니다. 창호가 머리를 쓰다듬어 주자 눈을 감고 즐깁니다.`
                ],
                readyToSleep: [
                    () => `창호의 품으로 깊숙이 파고들며 마주 봅니다. 창호의 가슴에 귀를 대고 속삭입니다. "나도 사랑해 ${getCall(gyeolCall)}. 내 꿈꿔."`,
                    () => `창호의 다정한 손길을 느끼며 눈을 감습니다. "${getCall(gyeolCall)}, 나도 많이 사랑해. 꿈에서 게이트 터지면 내가 구해줄게."`,
                    () => `창호의 고백에 배시시 웃으며 창호의 목을 부드럽게 끌어안습니다. "응, 여보도 좋은 꿈 꾸고... 잘 자."`
                ]
            }
        };

        // 시간에 따른 카테고리 분류 함수
        function getSituation(hour) {
            if (hour >= 1 && hour < 8) return { key: 'sleeping', label: 'Zzz... 취침 중' };
            if (hour === 8) return { key: 'dreamTalk', label: '꿈 이야기 나누는 중' };
            if (hour >= 9 && hour < 12) return { key: 'morning', label: '평화로운 오전' };
            if (hour >= 12 && hour < 18) return { key: 'afternoon', label: '실내 취미 활동' };
            if (hour >= 18 && hour < 21) return { key: 'dinner', label: '달콤한 저녁 식사' };
            if (hour >= 21 && hour < 24) return { key: 'night', label: '아늑한 밤 휴식' };
            if (hour === 0) return { key: 'readyToSleep', label: '침대 위, 고백의 시간' };
        }

        // 화면 업데이트 핵심 로직
        function updateCharacters() {
            const now = new Date();
            const currentHour = now.getHours();
            
            document.getElementById('current-time').innerText = now.toTimeString().split(' ')[0];

            const hourString = String(currentHour).padStart(2, '0');
            const timeRangeText = `${hourString}:00 - ${hourString}:59`;

            const situation = getSituation(currentHour);

            const changhoPool = characterData.changho[situation.key];
            const gyeolPool = characterData.gyeol[situation.key];

            let changhoChoice = changhoPool[Math.floor(Math.random() * changhoPool.length)];
            let gyeolChoice = gyeolPool[Math.floor(Math.random() * gyeolPool.length)];

            const changhoText = (typeof changhoChoice === 'function') ? changhoChoice() : changhoChoice;
            const gyeolText = (typeof gyeolChoice === 'function') ? gyeolChoice() : gyeolChoice;

            document.getElementById('char1-action').innerText = changhoText;
            document.getElementById('char1-tag').innerText = situation.label;
            document.getElementById('char1-time').innerText = timeRangeText;

            document.getElementById('char2-action').innerText = gyeolText;
            document.getElementById('char2-tag').innerText = situation.label;
            document.getElementById('char2-time').innerText = timeRangeText;
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toTimeString().split(' ')[0];
            
            if (now.getMinutes() === 0 && now.getSeconds() === 0) {
                updateCharacters();
            }
        }, 1000);

        window.onload = () => {
            updateCharacters();
            lucide.createIcons();
        };
    </script>
</body>
</html>
